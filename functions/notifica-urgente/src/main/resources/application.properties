# ---------------------------------------------------------------------------
# notifica-urgente — Cloud Function (GCP gen2) acionada pelo topico Pub/Sub
# "feedback-urgente". Envia e-mail ao administrador via SMTP.
#
# Todas as credenciais chegam por variavel de ambiente (injetadas no deploy,
# com SMTP_PASSWORD vindo do Secret Manager). Nada sensivel fica versionado.
# ---------------------------------------------------------------------------

# SMTP (padroes de Gmail; sobrescreva SMTP_HOST/SMTP_PORT se usar outro provedor)
quarkus.mailer.from=${SMTP_USER}
quarkus.mailer.host=${SMTP_HOST:smtp.gmail.com}
quarkus.mailer.port=${SMTP_PORT:587}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${SMTP_USER}
quarkus.mailer.password=${SMTP_PASSWORD}
# Garante envio real (o mock so e ativado por padrao em dev/test)
quarkus.mailer.mock=false

# Destinatario das notificacoes (e-mail do admin)
app.admin-email=${ADMIN_EMAIL}

# Log
quarkus.log.level=INFO
quarkus.log.category."br.com.fiap.sysfeedback".level=DEBUG
