# Configuração de teste: banco H2 em memória, para o contexto Spring subir
# sem depender de um Postgres local e sem gravar nada no banco de desenvolvimento.

spring.datasource.url=jdbc:h2:mem:sysfeedback;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
