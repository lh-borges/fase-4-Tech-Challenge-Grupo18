# Profile de produção (Cloud Run) — ativado por SPRING_PROFILES_ACTIVE=prod.
# Sobrescreve o datasource local do application.properties usando as secrets
# injetadas pelo deploy (--set-secrets DB_URL/DB_USER/DB_PASSWORD).

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# jwt.secret e jwt.expiration-ms herdados do application.properties base.
