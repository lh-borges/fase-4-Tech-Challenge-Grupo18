spring.application.name=SysFeedback

# PostgreSQL (banco de testes)
spring.datasource.url=jdbc:postgresql://localhost:5432/grupo18
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Reduz N+1 ao carregar coleções (ex.: os mapas @ElementCollection do Feedback)
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# JWT
jwt.secret=dGhpYWdvLWZpYXAtY2xvdWQtMjAyNC10ZWNoLWNoYWxsZW5nZS1ncnVwby0xOC1zZWN1cmUtand0LWhlY3RvcmRvdGNpZWwK
jwt.expiration-ms=86400000

# Google Cloud Pub/Sub
# project-id vazio por padrao: localmente a publicacao e best-effort (loga e ignora);
# no Cloud Run o projeto e resolvido automaticamente pelo metadata server / ADC.
gcp.project-id=${GCP_PROJECT_ID:}
gcp.pubsub.topic.feedback-urgente=feedback-urgente